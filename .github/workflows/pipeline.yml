name: Dark Narrative Pipeline

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      resume_run_id:
        description: "Existing VPS run_id (skips Phase 1/2; reuses mid-pipeline from source_gha_run_id)"
        required: false
        type: string
        default: ""
      source_gha_run_id:
        description: "GHA run id that has the mid-pipeline artifact (required when resume_run_id is set)"
        required: false
        type: string
        default: ""
      trigger_vps_resume:
        description: "Also POST /resume on VPS before polling"
        required: false
        type: boolean
        default: true

env:
  VPS_URL: ${{ secrets.VPS_WEBHOOK_URL }}
  VPS_SECRET: ${{ secrets.VPS_WEBHOOK_SECRET }}

jobs:
  script-and-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      run_id: ${{ steps.meta.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: ${{ inputs.resume_run_id == '' }}
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        if: ${{ inputs.resume_run_id == '' }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fontconfig

      - uses: actions/download-artifact@v4
        if: ${{ inputs.resume_run_id == '' }}
        continue-on-error: true
        with:
          name: topic-history
          path: config

      - name: Verify NotebookLM auth
        if: ${{ inputs.resume_run_id == '' }}
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          if [ -z "$NOTEBOOKLM_AUTH_JSON" ]; then
            echo "NOTEBOOKLM_AUTH_JSON secret is empty. Run scripts/export_notebooklm_secret.ps1"
            exit 1
          fi
          notebooklm auth check --test --json

      - name: Phase 1 — NotebookLM
        if: ${{ inputs.resume_run_id == '' }}
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python src/phase1_script.py --output output

      - name: Phase 2 — edge-tts
        if: ${{ inputs.resume_run_id == '' }}
        run: python src/phase2_audio.py --input output --output output

      - name: Resume — download mid-pipeline from prior GHA run
        if: ${{ inputs.resume_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RESUME_RUN_ID: ${{ inputs.resume_run_id }}
        run: |
          set -euo pipefail
          SRC="${{ inputs.source_gha_run_id }}"
          if [ -z "$SRC" ]; then
            echo "source_gha_run_id is required when resume_run_id is set"
            exit 1
          fi
          mkdir -p output
          gh run download "$SRC" -n mid-pipeline -D output --repo "${{ github.repository }}"
          python - <<'PY'
          import json, pathlib, os
          meta = pathlib.Path("output/metadata.json")
          data = json.loads(meta.read_text(encoding="utf-8"))
          want = os.environ["RESUME_RUN_ID"]
          got = data.get("run_id")
          if got != want:
              raise SystemExit(f"mid-pipeline run_id mismatch: artifact={got!r} expected={want!r}")
          print(f"Resuming run_id={got} topic={data.get('topic')}")
          # Keep artifact thumbnail.json in sync with the catchy VPS prompt for this topic.
          thumb_path = pathlib.Path("output/thumbnail.json")
          old = json.loads(thumb_path.read_text(encoding="utf-8")) if thumb_path.exists() else {}
          old["prompt"] = (
              "Edge-to-edge 16:9 cream high-contrast stick-figure YouTube thumbnail, "
              "giant close-up of a stubborn stick figure pushing away a huge open helping hand "
              "with both arms while drowning under an oversized collapsing to-do stack, "
              "tense gritted expression, bold thick black outlines, subject fills most of the frame "
              "phone-readable, quiet cream space on the left third for title overlay, "
              "no borders no letterboxing no text no question marks no emoji, "
              "curiosity punch of pride refusing help"
          )
          old["topic"] = data.get("topic") or old.get("topic")
          old["title"] = data.get("title") or old.get("title")
          old["entity_refs"] = []
          thumb_path.write_text(json.dumps(old, indent=2) + "\n", encoding="utf-8")
          print("Updated thumbnail.json with CTR prompt")
          PY

      - name: Capture run_id
        id: meta
        run: |
          if [ -n "${{ inputs.resume_run_id }}" ]; then
            echo "run_id=${{ inputs.resume_run_id }}" >> "$GITHUB_OUTPUT"
          else
            RUN_ID=$(python -c "import json; print(json.load(open('output/metadata.json'))['run_id'])")
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger VPS image generation
        if: ${{ inputs.resume_run_id == '' }}
        run: |
          python src/trigger_vps.py \
            --scenes output/scenes.json \
            --entities output/entities.json \
            --metadata output/metadata.json \
            --run-id "${{ steps.meta.outputs.run_id }}"

      - name: Resume VPS image generation
        if: ${{ inputs.resume_run_id != '' && inputs.trigger_vps_resume }}
        run: |
          pip install httpx
          python src/trigger_vps.py --run-id "${{ steps.meta.outputs.run_id }}" --resume

      - name: Verify pipeline outputs before upload
        run: |
          ls -la output/
          required=(
            output/script.txt output/scenes.json output/metadata.json
            output/narration.mp3 output/scene_durations.json
            output/youtube_seo.json output/thumbnail.json
          )
          for f in "${required[@]}"; do
            test -s "$f" || { echo "Missing or empty: $f"; exit 1; }
          done
          # captions.srt may be empty in some older artifacts; regenerate later in render if needed
          if [ ! -s output/captions.srt ]; then
            echo "WARN: captions.srt missing/empty — upload may skip captions"
          fi

      - uses: actions/upload-artifact@v4
        id: upload-mid-pipeline
        continue-on-error: true
        with:
          name: mid-pipeline
          path: output/
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        id: upload-mid-pipeline-retry
        if: steps.upload-mid-pipeline.outcome == 'failure'
        with:
          name: mid-pipeline
          path: output/
          if-no-files-found: error

      - name: Fail if artifact upload failed
        if: steps.upload-mid-pipeline.outcome != 'success' && steps.upload-mid-pipeline-retry.outcome != 'success'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: ${{ inputs.resume_run_id == '' }}
        with:
          name: topic-history
          path: config/topic_history.json
          if-no-files-found: warn

  wait-for-images:
    needs: script-and-audio
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mid-pipeline
          path: output

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install httpx

      - name: Poll VPS until images ready
        run: python src/poll_vps.py --run-id "${{ needs.script-and-audio.outputs.run_id }}" --timeout 7200

      - name: Download images from VPS
        run: |
          python src/download_vps_images.py \
            --run-id "${{ needs.script-and-audio.outputs.run_id }}" \
            --output output/images \
            --durations output/scene_durations.json
          test -s output/images/thumbnail.png || {
            echo "Missing output/images/thumbnail.png — VPS did not produce custom thumbnail"
            exit 1
          }
          cp output/images/thumbnail.png output/thumbnail.png
          ls -la output/images/thumbnail.png output/thumbnail.png

      - uses: actions/upload-artifact@v4
        id: upload-images
        continue-on-error: true
        with:
          name: images
          path: output/images
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        id: upload-images-retry
        if: steps.upload-images.outcome == 'failure'
        with:
          name: images
          path: output/images
          if-no-files-found: error

      - name: Fail if artifact upload failed
        if: steps.upload-images.outcome != 'success' && steps.upload-images-retry.outcome != 'success'
        run: exit 1

  render:
    needs: [script-and-audio, wait-for-images]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fontconfig

      - uses: actions/download-artifact@v4
        with:
          name: mid-pipeline
          path: output

      - uses: actions/download-artifact@v4
        with:
          name: images
          path: output/images

      - name: Promote thumbnail for upload package
        run: |
          if [ -f output/images/thumbnail.png ]; then
            cp output/images/thumbnail.png output/thumbnail.png
          fi
          test -s output/thumbnail.png || {
            echo "Missing output/thumbnail.png after images download"
            exit 1
          }
          echo "Custom thumbnail ready ($(wc -c < output/thumbnail.png) bytes)"

      - name: Install Python deps for render
        run: pip install -r requirements.txt

      - name: Phase 4 — ffmpeg render
        run: python src/render_video.py output

      - name: Upload final video artifact (upload job reuses this — no re-render needed)
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: |
            output/final_video.mp4
            output/thumbnail.png
            output/captions.srt
            output/word_timings.json
            output/script.txt
            output/script_clean.txt
            output/metadata.json
            output/youtube_seo.json
          if-no-files-found: error

  upload:
    needs: [script-and-audio, render]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/download-artifact@v4
        with:
          name: final-video
          path: output

      - name: Install Python deps for upload
        run: pip install -r requirements.txt

      - name: Phase 5 — YouTube upload (optional; re-run this job alone after token refresh)
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_CLIENT_ID" ] || [ -z "$YOUTUBE_REFRESH_TOKEN" ]; then
            echo "YouTube secrets not set — video saved as artifact only."
            exit 0
          fi
          test -s output/final_video.mp4 || { echo "Missing final_video.mp4"; exit 1; }
          test -s output/thumbnail.png || { echo "Missing thumbnail.png — refusing upload without custom thumbnail"; exit 1; }
          test -s output/youtube_seo.json || { echo "Missing youtube_seo.json"; exit 1; }
          python src/phase5_upload.py \
            --video output/final_video.mp4 \
            --metadata output/metadata.json \
            --seo output/youtube_seo.json \
            --captions output/captions.srt \
            --thumbnail output/thumbnail.png

      - name: Alert on success
        if: success()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: bash scripts/alert.sh "Pipeline complete — run ${{ needs.script-and-audio.outputs.run_id }}"

  notify-failure:
    needs: [script-and-audio, wait-for-images, render, upload]
    if: ${{ always() && (needs.script-and-audio.result == 'failure' || needs.wait-for-images.result == 'failure' || needs.render.result == 'failure' || needs.upload.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Alert on failure
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: bash scripts/alert.sh "Pipeline FAILED — check GitHub Actions logs"
